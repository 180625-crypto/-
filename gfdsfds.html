<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Craft - 4 Features Added</title>
<style>
    body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; user-select: none; }
    
    /* メニュー画面 */
    #netUI { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #menuContent { background: #333; padding: 40px; border-radius: 10px; text-align: center; width: 320px; border: 2px solid #4caf50; }
    h1 { color: #4caf50; margin-top: 0; }
    input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 16px; outline: none; }
    .btn { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; }
    .btn-host { background: #4caf50; }
    .btn-join { background: #2196f3; }
    
    /* ゲーム画面UI */
    #gameUI { position: fixed; inset: 0; pointer-events: none; display: none; }
    #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
    #serverInfo { position: absolute; top: 20px; left: 20px; font-size: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: auto; }
    
    /* ★体力ゲージのUIを追加 */
    #stats { position: absolute; top: 70px; left: 20px; font-size: 28px; text-shadow: 2px 2px 0 #000; pointer-events: none; }

    /* 持ち物バー */
    #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; }
    .slot { width: 50px; height: 50px; border: 2px solid #555; margin: 0 3px; display: flex; justify-content: center; align-items: center; }
    .slot.active { border-color: white; background: rgba(255,255,255,0.3); }
</style>

<script>
function onStartClicked(mode) {
    document.getElementById('netUI').style.display = 'none';
    document.getElementById('gameUI').style.display = 'block';
    const info = document.getElementById('serverInfo');
    info.innerText = "3Dエンジンを読み込み中...";

    loadScript("https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js", () => {
        loadScript("https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js", () => {
            info.innerText = "読み込み完了！世界を構築中...";
            setTimeout(() => startCoreGame(mode), 100);
        }, () => {
            info.innerText = "通信機能がブロックされました（シングルプレイで開始します）";
            setTimeout(() => startCoreGame(mode), 100);
        });
    }, () => {
        info.innerHTML = "<span style='color:#ff4b4b;'>エラー: 3Dライブラリがブロックされました。</span>";
    });
}

function loadScript(url, onSuccess, onError) {
    const script = document.createElement('script');
    script.src = url;
    script.onload = onSuccess;
    script.onerror = onError;
    document.head.appendChild(script);
}
