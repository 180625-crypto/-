<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Craft - Fixed UI Transition</title>
<style>
    body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; user-select: none; }
    
    /* メニュー画面 */
    #netUI { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #menuContent { background: #333; padding: 40px; border-radius: 10px; text-align: center; width: 320px; border: 2px solid #4caf50; }
    h1 { color: #4caf50; margin-top: 0; }
    input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 16px; outline: none; }
    .btn { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; }
    .btn-host { background: #4caf50; }
    .btn-host:hover { background: #45a049; }
    .btn-join { background: #2196f3; }
    .btn-join:hover { background: #1976d2; }
    
    /* ゲーム画面UI */
    #gameUI { position: fixed; inset: 0; pointer-events: none; display: none; }
    #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
    #serverInfo { position: absolute; top: 20px; left: 20px; font-size: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: auto; }
    
    /* 持ち物バー */
    #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; pointer-events: auto; }
    .slot { width: 50px; height: 50px; border: 2px solid #555; margin: 0 3px; display: flex; justify-content: center; align-items: center; }
    .slot.active { border-color: white; background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div id="netUI">
    <div id="menuContent">
        <h1>Mini Craft</h1>
        <input id="userName" type="text" placeholder="あなたの名前">
        <button class="btn btn-host" onclick="startGame('host')">世界を作成して開始</button>
        <hr style="border-color:#555; margin: 20px 0;">
        <input id="hostIdInput" type="text" placeholder="参加用4桁のIDを入力">
        <button class="btn btn-join" onclick="startGame('join')">友達の世界に参加する</button>
    </div>
</div>

<div id="gameUI">
    <div id="serverInfo">読み込み中...</div>
    <div id="crosshair">+</div>
    <div id="hotbar">
        <div class="slot active" id="s0"><div style="width:30px;height:30px;background:#4caf50"></div></div>
        <div class="slot" id="s1"><div style="width:30px;height:30px;background:#8b5a2b"></div></div>
        <div class="slot" id="s2"><div style="width:30px;height:30px;background:#888888"></div></div>
        <div class="slot" id="s3"><div style="width:30px;height:30px;background:rgba(33,150,243,0.6)"></div></div>
        <div class="slot" id="s4"><div style="width:30px;height:30px;background:#333"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

// --- ゲーム開始（ボタンが押されたらここが呼ばれる） ---
function startGame(mode) {
    try {
        // 1. 【最優先】何があってもまずは画面を切り替える
        document.getElementById("netUI").style.display = "none";
        document.getElementById("gameUI").style.display = "block";

        // 2. Three.js が読み込めているかチェック
        if (typeof THREE === 'undefined') {
            alert("エラー: 3Dライブラリ(Three.js)が読み込めませんでした。ネット接続を確認してください。");
            return;
        }

        // 3. 少しだけ遅らせてから重い3D処理を開始する（画面のフリーズを防ぐため）
        setTimeout(() => {
            init3D();
            generateWorld();
            initControls();
            initNetwork(mode);
            animate();
        }, 50);

    } catch (e) {
        alert("エラーが発生しました: " + e.message);
        console.error(e);
    }
}
