<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini Craft - Fixed Start</title>
<style>
    body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; }
    /* 初期メニュー */
    #netUI { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    #menuContent { background: #333; padding: 40px; border-radius: 15px; text-align: center; width: 350px; border: 3px solid #4caf50; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    h1 { color: #4caf50; margin-bottom: 20px; }
    input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; font-size: 16px; outline: none; }
    .btn { width: 100%; padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.2s; }
    .btn-start { background: #4caf50; margin-bottom: 10px; }
    .btn-start:hover { background: #45a049; }
    
    /* ゲームUI */
    #gameUI { position: fixed; inset: 0; pointer-events: none; display: none; }
    #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
    #stats { position: absolute; top: 20px; left: 20px; font-size: 22px; text-shadow: 2px 2px #000; }
    #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; pointer-events: auto; }
    .slot { width: 50px; height: 50px; border: 2px solid #555; margin: 0 3px; display: flex; justify-content: center; align-items: center; }
    .slot.active { border-color: white; background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="netUI">
    <div id="menuContent">
        <h1>MINI CRAFT</h1>
        <input id="userName" type="text" placeholder="名前を入力してください">
        <button class="btn btn-start" onclick="launchGame()">世界を作成して開始</button>
        <p style="color: #888; font-size: 12px;">※開始後、画面をクリックで操作開始</p>
    </div>
</div>

<div id="gameUI">
    <div id="stats">
        <div id="hp">❤️❤️❤️❤️❤️</div>
        <div id="food">🍎🍎🍎🍎🍎</div>
    </div>
    <div id="crosshair">+</div>
    <div id="hotbar">
        <div class="slot active" id="s0"><div style="width:30px;height:30px;background:#4caf50"></div></div>
        <div class="slot" id="s1"><div style="width:30px;height:30px;background:#8b5a2b"></div></div>
        <div class="slot" id="s2"><div style="width:30px;height:30px;background:#888888"></div></div>
        <div class="slot" id="s3"><div style="width:30px;height:30px;background:rgba(33,150,243,0.6)"></div></div>
        <div class="slot" id="s4"><div style="width:30px;height:30px;background:#222"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

    scene.add(mesh);
    blocks.set(k, { mesh, type });
}
